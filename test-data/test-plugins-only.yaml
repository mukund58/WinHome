version: "1.0"

# First-Class Plugin Sections
vim:
  extensions:
    - "tpope/vim-commentary"
  settings:
    number: true
    relativenumber: true
    theme: "morning"

vscode:
  extensions:
    - "dbaeumer.vscode-eslint"
  settings:
    "editor.tabSize": 2
    "files.autoSave": "afterDelay"

obsidian:
  vaults:
    - path: "C:\\Users\\test\\Documents\\TestVault"
      settings:
        spellcheck: true
      plugins:
        - "obsidian-git"

ohmyposh:
  profile: "C:\\Users\\test\\Documents\\PowerShell\\Microsoft.PowerShell_profile.ps1"
  settings:
    theme: "tokyonight"

# Generic Plugin Section
extensions:
  test-echo:
    message: "Python Plugin Integration Test"
  test-echo-js:
    message: "JavaScript Plugin Integration Test"
  
